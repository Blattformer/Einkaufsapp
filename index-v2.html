<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Familien-Planer V2</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --bg: #0a0a0c; 
            --card-bg: #1c1c1e; 
            --primary: #8bd3a5; 
            --primary-dark: #2a4d3a;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --border: #2c2c2e;
            --danger: #d39a91; 
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); color: var(--text-main); 
            margin: 0; padding: 0; overflow-x: hidden;
        }

        /* --- VIEWS --- */
        .view-section { display: none; padding-bottom: 120px; min-height: 100vh;}
        .view-section.active { display: block; }

        /* --- HEADER EINKAUF --- */
        .header-container {
            position: relative;
            background-image: linear-gradient(to bottom, rgba(10,10,12,0.1) 0%, rgba(10,10,12,1) 100%), url('https://images.unsplash.com/photo-1606914501449-5a96b6ce24ca?q=80&w=800&auto=format&fit=crop');
            background-size: cover; background-position: center;
            padding: 60px 20px 20px 20px;
        }

        .btn-sort-top {
            position: absolute; top: 20px; right: 20px;
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: none; color: var(--primary); width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        .header-subtitle { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); font-weight: 700; margin-bottom: 5px; }
        .header-subtitle-green { color: var(--primary); }

        .header-controls { display: flex; gap: 10px; align-items: center; }

        .list-select-wrapper { 
            flex-grow: 1; position: relative; 
            background: rgba(40, 40, 42, 0.5); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center;
        }

        select { 
            width: 100%; padding: 12px 35px 12px 15px; background: transparent; border: none; 
            color: var(--text-main); font-size: 1.2rem; font-weight: 600; font-family: 'Plus Jakarta Sans', sans-serif;
            outline: none; appearance: none; -webkit-appearance: none; cursor: pointer;
        }
        select option { background-color: var(--card-bg); color: var(--text-main); }
        .select-arrow { position: absolute; right: 12px; color: var(--text-muted); pointer-events: none; }

        .header-btn {
            background: rgba(40, 40, 42, 0.5); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1); color: var(--text-main); width: 48px; height: 48px; 
            border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .header-btn.add { color: var(--primary); }
        .header-btn.del { color: var(--danger); }

        /* --- LISTEN & KARTEN --- */
        .list-container { display: flex; flex-direction: column; gap: 12px; padding: 0 20px; margin-top: 10px; }
        
        .item-row { 
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; 
            display: flex; align-items: center; padding: 12px 16px;
        }

        .btn-star { background: none; border: none; cursor: pointer; color: var(--text-muted); margin-right: 12px; padding: 0; display: flex; align-items: center; }
        .btn-star.is-fav { color: var(--primary); fill: var(--primary); }
        .qty-display { font-weight: 700; color: var(--primary); margin-right: 8px; font-size: 0.95rem; }
        .name-text { flex-grow: 1; font-size: 1.05rem; font-weight: 500; }
        .qty-input { 
            width: 45px; height: 32px; border: none; border-radius: 8px; text-align: center; 
            background: rgba(255,255,255,0.05); color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 600; font-size: 0.9rem; margin-right: 10px;
        }
        .btn-delete { color: var(--text-muted); border: none; background: none; cursor: pointer; padding: 5px; display: flex; align-items: center; }

        .add-area {
            position: fixed; bottom: 105px; left: 20px; right: 20px; background: var(--card-bg); padding: 8px; 
            border-radius: 16px; border: 1px solid var(--border); display: flex; gap: 10px; align-items: center; z-index: 2000;
        }
        #newItemName { flex-grow: 1; padding: 12px; border: none; background: transparent; color: var(--text-main); font-size: 1rem; font-family: 'Plus Jakarta Sans', sans-serif; outline: none; }
        #newItemName::placeholder { color: var(--text-muted); }
        .btn-add-main { background: var(--primary); color: #000; border: none; width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* --- REZEPTE ÜBERSICHT --- */
        .recipe-header { padding: 60px 20px 20px; }
        .recipe-title-main { font-size: 2rem; font-weight: 700; margin: 0; }
        
        .recipe-card {
            background: var(--card-bg); border-radius: 20px; overflow: hidden; margin-bottom: 20px;
            border: 1px solid var(--border); cursor: pointer;
        }
        .recipe-img-preview { width: 100%; height: 180px; object-fit: cover; background: #222; }
        .recipe-card-info { padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
        .recipe-card-title { font-size: 1.15rem; font-weight: 600; margin: 0; }
        .recipe-card-icon { background: var(--primary-dark); color: var(--primary); padding: 8px; border-radius: 10px; display: flex; }

        .recipe-card-dashed {
            border: 2px dashed #444; border-radius: 20px; padding: 30px 20px; text-align: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; cursor: pointer;
        }
        .btn-circle-add { background: rgba(255,255,255,0.1); width: 50px; height: 50px; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: var(--primary); }
        .btn-add-recipe { background: var(--primary); color: #000; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 600; font-family: 'Plus Jakarta Sans', sans-serif; }

        /* --- REZEPT DETAILS --- */
        .detail-top-bar {
            position: absolute; top: 0; left: 0; right: 0; padding: 20px; display: flex; align-items: center; gap: 15px;
            z-index: 10; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }
        .btn-back { background: none; border: none; color: var(--primary); display: flex; align-items: center; gap: 10px; font-size: 1.1rem; font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 600; cursor: pointer; }
        
        .detail-image-area {
            position: relative; width: 100%; height: 300px; background: #222;
            background-size: cover; background-position: center; transition: background-image 0.3s ease;
        }
        .detail-image-area::after {
            content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 100px;
            background: linear-gradient(to top, var(--bg), transparent);
        }
        .btn-upload-img {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 5;
            background: rgba(42, 77, 58, 0.8); backdrop-filter: blur(10px); color: var(--primary); border: 1px solid var(--primary-dark);
            padding: 12px 20px; border-radius: 12px; font-weight: 600; font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex; align-items: center; gap: 10px; cursor: pointer; transition: all 0.3s ease;
        }
        
        .detail-content { padding: 0 20px; position: relative; z-index: 10; margin-top: -50px; }
        .detail-title-box { background: var(--card-bg); border-radius: 16px; padding: 15px 20px; border: 1px solid var(--border); margin-bottom: 30px; }
        .detail-title-input { background: transparent; border: none; width: 100%; color: var(--text-main); font-size: 1.5rem; font-weight: 700; font-family: 'Plus Jakarta Sans', sans-serif; outline: none; }
        .detail-title-input::placeholder { color: #555; }

        .section-title { font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; }
        .section-subtitle { color: var(--text-muted); font-size: 0.9rem; margin: 0 0 20px 0; }

        .btn-save-large {
            width: 100%; background: var(--primary); color: #000; border: none; padding: 18px; border-radius: 16px; font-weight: 700; font-size: 1.1rem; font-family: 'Plus Jakarta Sans', sans-serif; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 20px;
        }

        .ingredient-input-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .ingredient-input { flex-grow: 1; background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 12px; color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif; outline: none; }

        /* --- BOTTOM NAV --- */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; height: 85px; padding-bottom: env(safe-area-inset-bottom);
            background: rgba(10, 10, 12, 0.95); backdrop-filter: blur(15px); border-top-left-radius: 24px; border-top-right-radius: 24px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
            display: flex; justify-content: space-around; align-items: center; z-index: 2500;
        }
        .nav-item {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--text-muted); font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.5px; cursor: pointer; gap: 4px; height: 70%; margin: 0 10px; border-radius: 16px; transition: all 0.3s ease;
        }
        .nav-item.active { color: var(--primary); background: var(--primary-dark); box-shadow: 0 0 15px var(--primary-dark); }
        .nav-item.active i { color: var(--primary); }

        #imageUploadInput { display: none; }
    </style>
</head>
<body>

<div id="view-shopping" class="view-section active">
    <div class="header-container">
        <div class="header-subtitle"><span class="header-subtitle-green">Aktuelle Liste</span></div>
        <div class="header-controls">
            <div class="list-select-wrapper">
                <select id="listSelect" onchange="switchList()"></select>
                <i data-lucide="chevron-down" size="20" class="select-arrow"></i>
            </div>
            <button class="header-btn add" onclick="alert('Neue Liste: Kommt bald im Modal!')"><i data-lucide="plus" size="24"></i></button>
            <button class="header-btn del" onclick="deleteCurrentList()"><i data-lucide="trash-2" size="20"></i></button>
        </div>
    </div>
    <div class="list-container" id="shoppingList"></div>
    <div class="add-area">
        <input type="text" id="newItemName" placeholder="Artikel hinzufügen..." enterkeyhint="go" onkeypress="if(event.key==='Enter') addItem()">
        <button class="btn-add-main" onclick="addItem()"><i data-lucide="plus" color="#000" stroke-width="3"></i></button>
    </div>
</div>

<div id="view-recipes" class="view-section">
    <div class="recipe-header">
        <div class="header-subtitle">Inspiration</div>
        <h1 class="recipe-title-main">Deine Rezepte</h1>
    </div>

    <div class="list-container" id="recipesListContainer"></div>

    <div class="list-container" style="margin-top: 10px;">
        <div class="recipe-card-dashed" onclick="openRecipeEditor()">
            <div class="btn-circle-add"><i data-lucide="plus" size="24"></i></div>
            <div style="font-weight: 700; font-size: 1.1rem;">Neues Rezept</div>
            <div style="color: var(--text-muted); font-size: 0.85rem;">Füge deiner Sammlung ein<br>neues frisches Rezept hinzu.</div>
            <button class="btn-add-recipe">Hinzufügen</button>
        </div>
    </div>
</div>

<div id="view-recipe-detail" class="view-section" style="padding-bottom: 40px;">
    <input type="file" id="imageUploadInput" accept="image/*" onchange="handleImageSelection(event)">

    <div class="detail-top-bar">
        <button class="btn-back" onclick="switchTab('recipes')"><i data-lucide="arrow-left" size="20"></i> Zu den Rezepten</button>
    </div>

    <div class="detail-image-area" id="detailImageArea" style="background-image: url('https://images.unsplash.com/photo-1596683709605-72877a5ebbd3?q=80&w=800&auto=format&fit=crop');">
        <button class="btn-upload-img" id="btnUploadImage" onclick="document.getElementById('imageUploadInput').click()">
            <i data-lucide="camera" size="20"></i> BILD HOCHLADEN
        </button>
    </div>

    <div class="detail-content">
        <div class="detail-title-box">
            <div class="header-subtitle">Rezeptname</div>
            <input type="text" id="recipeTitleInput" class="detail-title-input" placeholder="Rezeptname eingeben">
        </div>

        <h2 class="section-title">Zutaten</h2>
        <p class="section-subtitle">Was wird für dieses Gericht benötigt?</p>

        <div id="recipeIngredientsList" style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px;"></div>

        <div class="ingredient-input-row">
            <input type="text" id="newIngredientInput" class="ingredient-input" placeholder="Zutat (z.B. 500g Hackfleisch)" onkeypress="if(event.key==='Enter') addIngredientToEditor()">
            <button class="btn-add-main" onclick="addIngredientToEditor()"><i data-lucide="plus" color="#000"></i></button>
        </div>

        <button class="btn-save-large" onclick="saveRecipe()">
            <i data-lucide="check-circle-2" size="22"></i> Rezept Speichern
        </button>
    </div>
</div>

<nav class="bottom-nav" id="mainNav">
    <div class="nav-item" id="nav-recipes" onclick="switchTab('recipes')">
        <i data-lucide="utensils-crossed" size="22"></i><span>Rezepte</span>
    </div>
    <div class="nav-item active" id="nav-shopping" onclick="switchTab('shopping')">
        <i data-lucide="shopping-cart" size="22"></i><span>Einkauf</span>
    </div>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc, query, where, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD5m0MvysOWVb53pRpqCXaMnofUTBjNgDo",
        authDomain: "einkaufsliste-2-d392b.firebaseapp.com",
        projectId: "einkaufsliste-2-d392b",
        storageBucket: "einkaufsliste-2-d392b.firebasestorage.app",
        messagingSenderId: "883591306736",
        appId: "1:883591306736:web:5c9754c6ab03157b1bd135"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    let currentList = "Wocheneinkauf";
    let localItems = []; 
    let recipes = [];
    
    // Rezept Editor Status
    let editingRecipe = {
        title: '',
        imageUrl: 'https://images.unsplash.com/photo-1596683709605-72877a5ebbd3?q=80&w=800&auto=format&fit=crop', // Standardbild
        ingredients: []
    };

    lucide.createIcons();

    // --- NAVIGATION ---
    window.switchTab = function(tabName) {
        document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById('mainNav').style.display = 'flex'; 

        if(tabName === 'shopping') {
            document.getElementById('view-shopping').classList.add('active');
            document.getElementById('nav-shopping').classList.add('active');
        } else if(tabName === 'recipes') {
            document.getElementById('view-recipes').classList.add('active');
            document.getElementById('nav-recipes').classList.add('active');
        }
    }

    // --- REZEPTE LOGIK ---
    function subscribeToRecipes() {
        const q = query(collection(db, "recipes"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            recipes = [];
            snapshot.forEach((doc) => recipes.push({ id: doc.id, ...doc.data() }));
            renderRecipesList();
        });
    }

    function renderRecipesList() {
        const container = document.getElementById('recipesListContainer');
        container.innerHTML = '';
        recipes.forEach(recipe => {
            const card = document.createElement('div');
            card.className = 'recipe-card';
            card.innerHTML = `
                <img src="${recipe.imageUrl}" class="recipe-img-preview">
                <div class="recipe-card-info">
                    <h3 class="recipe-card-title">${recipe.title}</h3>
                    <div class="recipe-card-icon"><i data-lucide="utensils-crossed" size="18"></i></div>
                </div>
            `;
            // Für später: card.onclick = () => openRecipeEditor(recipe);
            container.appendChild(card);
        });
        lucide.createIcons();
    }

    window.openRecipeEditor = function() {
        // Editor zurücksetzen
        editingRecipe = { title: '', imageUrl: 'https://images.unsplash.com/photo-1596683709605-72877a5ebbd3?q=80&w=800&auto=format&fit=crop', ingredients: [] };
        document.getElementById('recipeTitleInput').value = '';
        document.getElementById('detailImageArea').style.backgroundImage = `url('${editingRecipe.imageUrl}')`;
        document.getElementById('btnUploadImage').innerHTML = '<i data-lucide="camera" size="20"></i> BILD HOCHLADEN';
        renderEditorIngredients();

        document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
        document.getElementById('view-recipe-detail').classList.add('active');
        document.getElementById('mainNav').style.display = 'none'; 
        lucide.createIcons();
    }

    // --- BILD UPLOAD ---
    window.handleImageSelection = async function(event) {
        const file = event.target.files[0];
        if(!file) return;

        // Sofortige Vorschau
        const reader = new FileReader();
        reader.onload = function(e) { document.getElementById('detailImageArea').style.backgroundImage = `url('${e.target.result}')`; }
        reader.readAsDataURL(file);

        // Upload Status anzeigen
        const btnUpload = document.getElementById('btnUploadImage');
        btnUpload.innerHTML = 'LÄDT HOCH...';

        // Hochladen zu Firebase Storage
        const fileRef = ref(storage, 'recipes/' + Date.now() + '_' + file.name);
        try {
            await uploadBytesResumable(fileRef, file);
            const downloadURL = await getDownloadURL(fileRef);
            editingRecipe.imageUrl = downloadURL; // Neue URL speichern
            
            btnUpload.innerHTML = 'FERTIG!';
            setTimeout(() => { btnUpload.innerHTML = '<i data-lucide="camera" size="20"></i> BILD ÄNDERN'; lucide.createIcons(); }, 2000);
        } catch (error) {
            alert("Fehler beim Hochladen: " + error.message);
            btnUpload.innerHTML = '<i data-lucide="camera" size="20"></i> BILD HOCHLADEN';
        }
    }

    // --- ZUTATEN & SPEICHERN ---
    window.addIngredientToEditor = function() {
        const input = document.getElementById('newIngredientInput');
        const text = input.value.trim();
        if(text) {
            editingRecipe.ingredients.push(text);
            input.value = '';
            renderEditorIngredients();
        }
    }

    window.removeIngredientFromEditor = function(index) {
        editingRecipe.ingredients.splice(index, 1);
        renderEditorIngredients();
    }

    function renderEditorIngredients() {
        const container = document.getElementById('recipeIngredientsList');
        container.innerHTML = '';
        editingRecipe.ingredients.forEach((ing, index) => {
            const row = document.createElement('div');
            row.className = 'item-row';
            row.innerHTML = `
                <span class="name-text">${ing}</span>
                <button class="btn-delete" onclick="removeIngredientFromEditor(${index})"><i data-lucide="x" size="20"></i></button>
            `;
            container.appendChild(row);
        });
        lucide.createIcons();
    }

    window.saveRecipe = async function() {
        const title = document.getElementById('recipeTitleInput').value.trim();
        if(!title) { alert("Bitte gib dem Rezept einen Namen!"); return; }

        editingRecipe.title = title;
        
        // Speichere in Firestore Datenbank
        await addDoc(collection(db, "recipes"), {
            title: editingRecipe.title,
            imageUrl: editingRecipe.imageUrl,
            ingredients: editingRecipe.ingredients,
            createdAt: serverTimestamp()
        });

        // Zurück zur Übersicht
        switchTab('recipes');
    }

    // --- EINKAUFSLISTEN LOGIK (Kompakt) ---
    function subscribeToItems() {
        const q = query(collection(db, "shopping_items"), where("listName", "==", currentList), orderBy("sortOrder", "asc"));
        onSnapshot(q, (snapshot) => {
            localItems = [];
            snapshot.forEach((doc) => localItems.push({ id: doc.id, ...doc.data() }));
            renderList(localItems);
        });
    }

    function renderList(items) {
        const listContainer = document.getElementById('shoppingList');
        listContainer.innerHTML = items.length === 0 ? '<div style="text-align:center; padding: 40px; color: var(--text-muted);">Liste ist leer</div>' : '';
        items.forEach((item) => {
            const row = document.createElement('div');
            row.className = 'item-row';
            const starIcon = item.fav ? '<i data-lucide="star" fill="currentColor"></i>' : '<i data-lucide="star"></i>';
            row.innerHTML = `
                <button class="btn-star ${item.fav ? 'is-fav' : ''}">${starIcon}</button>
                <div class="name-text">${item.name}</div>
                <button class="btn-delete" onclick="requestDelete('${item.id}')"><i data-lucide="x" size="20"></i></button>
            `;
            listContainer.appendChild(row);
        });
        lucide.createIcons(); 
    }

    window.requestDelete = async function(id) { await deleteDoc(doc(db, "shopping_items", id)); }
    window.addItem = async function() {
        const input = document.getElementById('newItemName');
        if(input.value.trim()) {
            await addDoc(collection(db, "shopping_items"), { name: input.value.trim(), fav: false, listName: currentList, sortOrder: Date.now() });
            input.value = '';
        }
    }

    // Start
    subscribeToItems();
    subscribeToRecipes();

</script>
</body>
</html>
